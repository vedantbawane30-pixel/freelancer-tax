<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F2B5B"/>
      <stop offset="100%" style="stop-color:#1a3d7a"/>
    </linearGradient>
    <linearGradient id="rupee-shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Saffron accent top bar (India flag inspired) -->
  <rect x="0" y="0" width="100" height="8" rx="0" fill="#FF8C00" opacity="0.9"/>
  <rect x="0" y="0" width="100" height="8" rx="22" fill="#FF8C00" opacity="0.9"/>

  <!-- Green accent bottom bar -->
  <rect x="0" y="92" width="100" height="8" rx="0" fill="#138808" opacity="0.9"/>
  <rect x="0" y="92" width="100" height="8" rx="22" fill="#138808" opacity="0.9"/>

  <!-- Rupee symbol ₹ — custom drawn, bold and clear -->
  <!-- Top horizontal bar -->
  <rect x="28" y="25" width="44" height="7" rx="3.5" fill="url(#rupee-shine)"/>
  <!-- Second horizontal bar -->
  <rect x="28" y="38" width="35" height="6" rx="3" fill="url(#rupee-shine)"/>
  <!-- Vertical stem -->
  <rect x="28" y="25" width="8" height="50" rx="4" fill="url(#rupee-shine)"/>
  <!-- Diagonal slash (bottom part of ₹) -->
  <line x1="36" y1="50" x2="64" y2="75" stroke="url(#rupee-shine)" stroke-width="7" stroke-linecap="round"/>

  <!-- Small chart bars (bottom right — signals "calculator/tax") -->
  <rect x="58" y="60" width="7" height="14" rx="2" fill="white" opacity="0.25"/>
  <rect x="68" y="52" width="7" height="22" rx="2" fill="white" opacity="0.35"/>
  <rect x="78" y="44" width="7" height="30" rx="2" fill="#FF8C00" opacity="0.7"/>
</svg>
